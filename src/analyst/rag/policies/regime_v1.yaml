id: regime_v1
version: "1.1.0"
mode: REGIME
track: stable
description: Regime state assessment. Balanced retrieval across text sources.

route:
  collections:
    - name: analyst_macro
      enabled: true
      weight: 1.0
      dense:
        enabled: true
        top_k: 15
      bm25:
        enabled: true
        top_k: 10
  fusion:
    rrf_k: 60
  budget:
    candidate_budget: 40
    final_context_k: 10
  rerank:
    enabled: true
    top_n: 10
  filters:
    default_days: 14
    source_type:
      weights:
        central_bank_comm: 1.3
        news_article: 1.0
        research_artifact: 0.9

selection:
  dedup:
    by: content_hash
  coverage_rules:
    central_bank_comm:
      min: 1
      max: 3
      priority: 1
    news_article:
      min: 1
      max: 4
      priority: 2
    research_artifact:
      min: 0
      max: 2
      priority: 3
  neighbor_expansion:
    enabled: false

fallback:
  stages:
    - action: increase_budget
      params:
        multiply: 1.5
