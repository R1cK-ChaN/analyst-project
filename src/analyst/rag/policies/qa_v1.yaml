id: qa_v1
version: "1.1.0"
mode: QA
track: stable
description: Free-form user questions. Balanced dense + BM25.

route:
  collections:
    - name: analyst_macro
      enabled: true
      weight: 1.0
      dense:
        enabled: true
        top_k: 15
      bm25:
        enabled: true
        top_k: 15
  fusion:
    rrf_k: 60
  budget:
    candidate_budget: 40
    final_context_k: 8
  rerank:
    enabled: true
    top_n: 10
  filters:
    default_days: 30

selection:
  dedup:
    by: content_hash
  coverage_rules:
    news_article:
      min: 0
      max: 4
      priority: 2
    central_bank_comm:
      min: 0
      max: 3
      priority: 1
    research_artifact:
      min: 0
      max: 3
      priority: 3
  neighbor_expansion:
    enabled: true
    before: 1
    after: 1

fallback:
  stages:
    - action: increase_budget
      params:
        multiply: 1.5
    - action: disable_filters
