id: research_v1
version: "1.0.0"
mode: RESEARCH
track: stable
description: Flash commentary, regime refresh, deep-dive research.

route:
  collections:
    - name: analyst_macro
      enabled: true
      weight: 1.0
      dense:
        enabled: true
        top_k: 20
      bm25:
        enabled: true
        top_k: 15
  fusion:
    rrf_k: 60
  budget:
    candidate_budget: 50
    final_context_k: 10
  rerank:
    enabled: true
    top_n: 15
  filters:
    source_type:
      weights:
        news_article: 1.0
        central_bank_comm: 1.2
        indicator: 0.9
        calendar_event: 0.8
        research_artifact: 1.1

selection:
  dedup:
    by: content_hash
  coverage_rules:
    news_article:
      min: 1
      max: 5
      priority: 2
    central_bank_comm:
      min: 1
      max: 3
      priority: 1
    indicator:
      min: 0
      max: 3
      priority: 3
    calendar_event:
      min: 0
      max: 2
      priority: 4
    research_artifact:
      min: 0
      max: 2
      priority: 5
  neighbor_expansion:
    enabled: true
    before: 1
    after: 1

fallback:
  stages:
    - action: increase_budget
      params:
        multiply: 1.5
    - action: disable_filters
