id: briefing_v1
version: "1.0.0"
mode: BRIEFING
track: stable
description: Morning/after-market briefings. BM25-heavy for keyword-dense headlines.

route:
  collections:
    - name: analyst_macro
      enabled: true
      weight: 1.0
      dense:
        enabled: true
        top_k: 15
      bm25:
        enabled: true
        top_k: 20
  fusion:
    rrf_k: 60
  budget:
    candidate_budget: 40
    final_context_k: 12
  rerank:
    enabled: true
    top_n: 12
  filters: {}

selection:
  dedup:
    by: content_hash
  coverage_rules:
    news_article:
      min: 2
      max: 6
      priority: 1
    central_bank_comm:
      min: 0
      max: 3
      priority: 2
    calendar_event:
      min: 1
      max: 3
      priority: 3
    indicator:
      min: 0
      max: 2
      priority: 4
    research_artifact:
      min: 0
      max: 2
      priority: 5
  neighbor_expansion:
    enabled: false

fallback:
  stages:
    - action: increase_budget
      params:
        multiply: 1.5
